<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Registrasi Pengguna</title>
  <base href="/web/">
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: sans-serif; background: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .card {
      background: white; padding: 2rem; border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px;
    }
    h2 { color: #007bff; text-align: center; margin-bottom: 1.5rem; }
    input {
      width: 100%; padding: 10px; margin-bottom: 1rem;
      border: 1px solid #ccc; border-radius: 4px;
    }
    button {
      width: 100%; padding: 10px; background: #007bff;
      color: white; border: none; border-radius: 4px;
      font-size: 1rem; cursor: pointer;
    }
    #msg { text-align: center; margin-top: 1rem; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Registrasi</h2>
    <form id="registerForm">
      <input type="text" id="username" placeholder="Username" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Daftar</button>
      <p id="msg"></p>
    </form>
  </div>

  <script>
    document.getElementById("registerForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      const res = await fetch("/web/api/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password }),
      });

      const data = await res.json();
      const msg = document.getElementById("msg");
      msg.style.color = data.success ? "green" : "red";
      msg.innerText = data.message;

      if (data.success) {
        setTimeout(() => window.location.href = "index.html", 2000);
      }
    });
  </script>
</body>
</html>
