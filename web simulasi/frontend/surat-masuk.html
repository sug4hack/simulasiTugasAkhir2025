<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Input Surat Masuk Manual</title>
  <base href="/web/">
  <link rel="stylesheet" href="style.css" />
  <style>
    .container {
      max-width: 600px;
      margin: 3rem auto;
      padding: 2rem;
      background-color: #ffffff;
      box-shadow: 0 6px 16px rgba(0,0,0,0.1);
      border-radius: 10px;
    }

    h2 {
      text-align: center;
      color: #007bff;
      margin-bottom: 1.5rem;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    label {
      margin: 0.5rem 0 0.2rem;
    }

    input, textarea, select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      margin-bottom: 1rem;
      font-size: 1rem;
    }

    button {
      background-color: #007bff;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }

    button:hover {
      background-color: #0056b3;
    }

    #info {
      text-align: center;
      margin-top: 1rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <div class="container">
    <h2>📩 Input Surat Masuk Manual</h2>
    <form id="formSuratMasuk" enctype="multipart/form-data">
      <label>Nomor Surat</label>
      <input type="text" name="nomor_surat" required>

      <label>Perihal</label>
      <input type="text" name="perihal" required>

      <label>Tanggal Surat</label>
      <input type="date" name="tanggal_surat" required>

      <label>Klasifikasi</label>
      <select name="klasifikasi" required>
        <option value="">-- Pilih Klasifikasi Surat --</option>
        <option value="biasa">Biasa</option>
        <option value="segera">Segera</option>
        <option value="penting">Penting</option>
        <option value="rahasia">Rahasia</option>
      </select>

      <label>Pengirim</label>
      <input type="text" name="pengirim" placeholder="Nama instansi/pengirim" required>

      <label>Penerima</label>
      <input type="text" name="penerima" id="penerimaField" readonly required>

      <label>Nama Dokumen</label>
      <input type="text" name="nama_dokumen" required>

      <label>Unggah File Surat</label>
      <input type="file" name="file" accept=".pdf,.doc,.docx,.jpg,.png" required>

      <button type="submit">Simpan Surat</button>
    </form>
    <p id="info"></p>
  </div>

  <script src="navbar.js"></script>
  <script>
  const API_BASE = '/web';

  const user = localStorage.getItem('user');
  if (!user) {
    location.href = 'index.html';
  }

  const penerimaInput = document.getElementById('penerimaField'); // pastikan input ini punya name="penerima"
  const form = document.getElementById('formSuratMasuk');
  const info = document.getElementById('info');

  // set penerima otomatis
  if (penerimaInput) penerimaInput.value = user;

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    info.style.color = '';
    info.textContent = '⏳ Mengunggah dan mengenkripsi surat...';

    // validasi dasar: pastikan ada file
    const fileInput = form.querySelector('input[type="file"][name="file"]');
    if (!fileInput || !fileInput.files.length) {
      info.style.color = 'red';
      info.textContent = '❌ Silakan unggah berkas PDF.';
      return;
    }

    // pastikan penerima terisi (otomatis)
    if (!penerimaInput.value) {
      penerimaInput.value = user;
    }

    try {
      const formData = new FormData(form);

      const res = await fetch(`${API_BASE}/surat-masuk-manual`, {
        method: 'POST',
        body: formData
      });

      if (!res.ok) {
        // kalau server balas non-2xx, coba ambil pesan
        let msg = `HTTP ${res.status}`;
        try {
          const j = await res.json();
          if (j?.message) msg = j.message;
        } catch {}
        throw new Error(msg);
      }

      const payload = await res.json(); // { success, message? }

      if (payload?.success) {
        info.style.color = 'green';
        info.textContent = '✅ Surat berhasil disimpan dan terenkripsi.';
        form.reset();
        // set lagi penerima setelah reset
        penerimaInput.value = user;
      } else {
        info.style.color = 'red';
        info.textContent = '❌ ' + (payload?.message || 'Gagal menyimpan surat.');
      }
    } catch (err) {
      console.error('surat-masuk-manual error:', err);
      info.style.color = 'red';
      info.textContent = '❌ Terjadi kesalahan jaringan atau server.';
    }
  });
</script>

</body>
</html>
